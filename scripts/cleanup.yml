# Cleanup template for the agentic-remediation demo.
#
# Replace <BRANCH> below with the timestamped branch the demo created
# (e.g. demo-20260518-184321), then load against the parent `data` branch
# in PATCH mode:
#
#   conjur policy update -f scripts/cleanup.yml -b data
#
# Equivalent REST call:
#
#   curl -X PATCH \
#     -H "Authorization: Token token=\"$(printf %s "$ACCESS_TOKEN" | base64)\"" \
#     -H "Content-Type: text/plain" \
#     --data-binary @scripts/cleanup.yml \
#     https://<your-tenant>.secretsmgr.cyberark.cloud/api/policies/conjur/policy/data
#
# POST is not valid here — it rejects !delete. PUT against the `data` branch
# is also not allowed. PATCH against `data` is the only working mode.

- !delete
  record: !policy <BRANCH>
